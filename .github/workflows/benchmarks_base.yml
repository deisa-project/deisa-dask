# This workflow runs a pytest benchmark and uploads the results to Bencher.
# Triggers on push to this repository's main branch, or manually via workflow_dispatch.
name: Run and track benchmarks for base

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  benchmark_base_branch:
    permissions:
      checks: write
    runs-on: ubuntu-latest
    # env:
