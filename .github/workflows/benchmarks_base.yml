      #         f'but mpi4py is linked against {mpi_impl_via_python_version}'
      #     )
      #     print('MPI implementation versions match')
      #     "

      - uses: bencherdev/bencher@main
      - name: Log in to Bencher registry
        run: |
          echo "${{ secrets.BENCHER_USER_KEY }}" | podman login registry.bencher.dev \
            --username "${{ secrets.BENCHER_REGISTRY_EMAIL }}" \
            --password-stdin
      - name: Build benchmark image
        run: podman build --platform linux/amd64 -t registry.bencher.dev/deisa-dask-bencher-test:latest -f benchmark/Dockerfile .
      - name: Push benchmark image
        run: podman push registry.bencher.dev/deisa-dask-bencher-test:latest
      - name: Run and track base branch pytest benchmarks with Bencher
        # env:
        #   MPI_IMPL: openmpi
        run: |
          bencher run \
          --project deisa-dask-bencher-test \
          --key "${{ secrets.BENCHER_API_KEY }}" \
          --branch "${{ github.ref_name }}" \
          --testbed bare-metal \
          --threshold-measure latency \
          --threshold-test t_test \
          --threshold-max-sample-size 64 \
          --threshold-upper-boundary 0.99 \
          --thresholds-reset \
          --error-on-alert \
          --github-actions "${{ secrets.GITHUB_TOKEN }}" \
          --adapter python_pytest \
          --file benchmark_results.json \
          --image deisa-dask-bencher-test:latest \
          "pytest benchmark/ --ignore=benchmark/test_dask_queue.py --benchmark-json=benchmark_results.json"
