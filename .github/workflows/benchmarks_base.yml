name: Run and track benchmarks for base

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  benchmark_base_branch:
    permissions:
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==2026.3.0 distributed==2026.3.0
          python -m pip install .
          python -m pip install .[test]
          python -m pip install pytest-benchmark

      - uses: bencherdev/bencher@main
      - name: Run and track base branch pytest benchmarks with Bencher
        run: |
          bencher run \
          --project deisa-dask-bencher-test \
          --key "${{ secrets.BENCHER_API_KEY }}" \
          --branch "${{ github.ref_name }}" \
          --testbed ubuntu-latest \
          --threshold-measure latency \
          --threshold-test t_test \
          --threshold-max-sample-size 64 \
          --threshold-upper-boundary 0.99 \
          --thresholds-reset \
          --error-on-alert \
          --adapter python_pytest \
          --file benchmark_results.json \
          --github-actions "${{ secrets.GITHUB_TOKEN }}" \
          "pytest benchmark/ --benchmark-json=benchmark_results.json"
