name: Python unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Test with pytest
        run: |
          pytest test/ -n auto --dist loadgroup

  mpi-tests:
    runs-on: ubuntu-latest
    # Restrict UCX transport selection for CI stability
    env:
      UCX_TLS: tcp,self
      FI_PROVIDER: tcp
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]
        mpi-impl: [ "openmpi", "mpich"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MPI + mpi4py (matched, self-contained wheels)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir mpi4py ${{ matrix.mpi-impl }}
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Check MPI implementation versions match
        run: |
          mpiexec --version
          python -c "
          import subprocess
          import re
          import mpi4py
          from mpi4py import MPI
          mpi_impl_via_python = MPI.Get_library_version()
          mpi_impl_via_python_version = re.search(r'\d+\.\d+\.\d+', mpi_impl_via_python).group()
          mpi_impl_via_cli = subprocess.check_output(['mpiexec', '--version'], text=True)
          mpi_impl_via_cli_version = re.search(r'\d+\.\d+\.\d+', mpi_impl_via_cli).group()
          print(f'mpi4py package version :                  {mpi4py.__version__}')
          print(f'MPI implementation linked by mpi4py :     {mpi_impl_via_python_version}')
          print(f'MPI implementation used by mpiexec CLI :  {mpi_impl_via_cli_version}')
          assert mpi_impl_via_python_version == mpi_impl_via_cli_version, (
              f'MPI implementation mismatch: mpiexec is {mpi_impl_via_cli_version} '
              f'but mpi4py is linked against {mpi_impl_via_python_version}'
          )
          print('MPI implementation versions match')
          "
      - name: MPI test with pytest
        env:
          MPI_IMPL: ${{ matrix.mpi-impl }}
        run: |
          pytest test/test_mpi.py
