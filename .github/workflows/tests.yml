name: Python unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Test with pytest
        run: |
          pytest test/

  mpi-tests:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]
        mpi-impl: ["openmpi", "mpich"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MPI
        run: |
          sudo apt-get update
          if [ "${{ matrix.mpi-impl }}" = "openmpi" ]; then
            sudo apt-get install -y openmpi-bin libopenmpi-dev
          else
            sudo apt-get install -y mpich libmpich-dev
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.mpi-impl }}" = "openmpi" ]; then
            MPICC=mpicc.openmpi pip install --no-binary=mpi4py --no-cache-dir mpi4py
          else
            MPICC=mpicc.mpich pip install --no-binary=mpi4py --no-cache-dir mpi4py
          fi
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test,mpi]
      - name: MPI test with pytest
        env:
          MPI_IMPL: ${{ matrix.mpi-impl }}
        run: |
          pytest test/test_mpi.py
