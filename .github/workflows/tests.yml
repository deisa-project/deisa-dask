name: Python unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Test with pytest
        run: |
          pytest test/ -n auto --dist loadgroup

  mpi-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]
        mpi-impl: ["openmpi", "mpich"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MPI
        run: |
          sudo apt-get update
          if [ "${{ matrix.mpi-impl }}" = "openmpi" ]; then
            sudo apt-get install -y openmpi-bin libopenmpi-dev
          else
            sudo apt-get install -y mpich libmpich-dev
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-binary mpi4py --no-cache-dir mpi4py
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test,mpi]
      - name: Verify mpi4py links to correct MPI
        run: |
          python -c "
          from mpi4py import MPI
          version = MPI.Get_library_version()
          print('mpi4py linked to:', version)
          impl = '${{ matrix.mpi-impl }}'
          version_lower = version.lower()
          if impl == 'openmpi':
              assert 'open mpi' in version_lower or 'openmpi' in version_lower, \
                  f'Expected OpenMPI but got: {version}'
          elif impl == 'mpich':
              assert 'mpich' in version_lower or 'hydra' in version_lower, \
                  f'Expected MPICH but got: {version}'
          print('OK: mpi4py flavor matches', impl)
          "
      - name: MPI test with pytest
        env:
          HYDRA_IFACE: lo
          UCX_NET_DEVICES: lo
        run: |
          pytest test/test_mpi.py
