name: Python unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Test with pytest
        run: |
          pytest test/ -n auto --dist loadgroup

  mpi-tests:
    runs-on: ubuntu-latest
    # Restrict UCX transport selection for CI stability
    env:
      UCX_TLS: tcp,self
      FI_PROVIDER: tcp
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]
        mpi-impl: [ "openmpi", "mpich"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install MPI + mpi4py (matched, self-contained wheels)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir mpi4py ${{ matrix.mpi-impl }}
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Check MPI versions match
        run: |
          mpiexec --version
          python -c "
          import subprocess
          import re
          from mpi4py import MPI
          lib = MPI.Get_library_version()
          lib_version = re.search(r'\d+\.\d+\.\d+', lib).group()
          cli = subprocess.check_output(['mpiexec', '--version'], text=True)
          cli_version = re.search(r'\d+\.\d+\.\d+', cli).group()
          print(f'mpi4py library version : {lib_version}')
          print(f'mpiexec CLI version :    {cli_version}')
          assert lib_version == cli_version, f'MPI version mismatch, CLI is {cli_version} but Python is bound to {lib_version}'
          print('MPI versions match')
          "
      - name: MPI test with pytest
        env:
          MPI_IMPL: ${{ matrix.mpi-impl }}
        run: |
          pytest test/test_mpi.py
