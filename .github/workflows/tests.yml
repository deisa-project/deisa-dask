name: Python unit tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install dask==${{ matrix.dask-version }} distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test]
      - name: Test with pytest
        run: |
          pytest test/

  mpi-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
        dask-version: [ "2025.5.0", "2025.7.0", "2025.11.0" ]
        mpi-impl: [ "openmpi", "mpich"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Setup MPI
        uses: mpi4py/setup-mpi@v1
        with:
          mpi: ${{ matrix.mpi-impl }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-binary=mpi4py --no-cache-dir mpi4py
          python -m pip install \
            dask==${{ matrix.dask-version }} \
            distributed==${{ matrix.dask-version }}
          python -m pip install .
          python -m pip install .[test,mpi]
      - name: Check MPI
        run: |
          which mpicc
          which mpiexec
          mpicc --version
          mpiexec -n 2 hostname
      - name: MPI test with pytest
        env:
          MPI_IMPL: ${{ matrix.mpi-impl }}
        run: |
          pytest test/test_mpi.py
